<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nassi-Shneiderman Control Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Palette — editor-first dark */
        --bg:          #0a0f18;
        --bg-accent:   #10182a;
        --surface:     #111827;
        --surface-2:   #172131;
        --surface-3:   #1c2940;
        --surface-4:   #233452;
        --border:      #2b3b59;
        --border-strong: #3f5378;
        --border-soft: #182338;
        --text:        #cfd8f6;
        --text-bright: #f4f7ff;
        --muted:       #8e9bbb;
        --shadow:      0 24px 72px rgba(3, 8, 18, 0.56);

        /* Accent colours */
        --blue:        #82aaff;
        --blue-dim:    #243b69;
        --green:       #a6da95;
        --green-dim:   #163628;
        --red:         #ff93a9;
        --red-dim:     #371925;
        --orange:      #ffb86b;
        --orange-dim:  #37230f;
        --teal:        #56d4dd;
        --teal-dim:    #11343b;
        --purple:      #c4a7ff;
        --purple-dim:  #2a1d41;
        --amber:       #f1ca7a;
        --amber-dim:   #39290f;

        /* Block fills */
        --loop-fill:   #132033;
        --switch-fill: #102529;
        --yes-fill:    #102217;
        --no-fill:     #251019;
        --action-fill: var(--surface-2);
        --note-fill:   #101720;

        /* Code font */
        --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", "Menlo", monospace;
        --ui:   "IBM Plex Sans", -apple-system, "Segoe UI", system-ui, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--ui);
        font-size: 14px;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(130, 170, 255, 0.12), transparent 28%),
          linear-gradient(180deg, var(--bg) 0%, #0c121d 100%);
        padding: 24px;
        min-height: 100vh;
        overflow-x: auto;
        color-scheme: dark;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      /* ── Viewer shell ── */
      .viewer {
        width: max-content;
        min-width: min(1200px, calc(100vw - 48px));
        margin: 0 auto;
        border: 1px solid var(--border-strong);
        border-radius: 14px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
          var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .titlebar {
        padding: 10px 16px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0)),
          var(--surface-3);
        border-bottom: 1px solid var(--border-strong);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .titlebar-icon {
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--blue-dim);
        border: 1px solid var(--blue);
        flex-shrink: 0;
      }
      .titlebar-text {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--text-bright);
        letter-spacing: 0.01em;
      }
      .toolbar {
        padding: 9px 16px;
        border-bottom: 1px solid var(--border-soft);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
          var(--surface);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        align-items: baseline;
      }
      .toolbar-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--blue);
        background: rgba(130, 170, 255, 0.14);
        border: 1px solid rgba(130, 170, 255, 0.3);
        border-radius: 999px;
        padding: 3px 8px;
        white-space: nowrap;
      }
      .toolbar-path {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        overflow-wrap: anywhere;
      }
      /* ── Viewer body ── */
      .viewer-body {
        padding: 16px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0) 180px),
          var(--bg);
      }
      /* ── Function panel ── */
      .function-panel {
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(10, 15, 24, 0.72);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
        overflow: hidden;
      }
      .function-panel:last-child { margin-bottom: 0; }
      .function-head {
        padding: 12px 16px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
          var(--surface-3);
        border-bottom: 1px solid var(--border-strong);
      }
      .function-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-bright);
        line-height: 1.3;
      }
      .function-signature {
        margin-top: 5px;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.6;
        color: var(--muted);
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .function-body {
        padding: 12px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
          rgba(7, 11, 18, 0.84);
      }
      .function-body > .ns-sequence {
        width: max-content;
        min-width: 100%;
      }
      /* ── Node sequence ── */
      .ns-sequence {
        display: flex;
        flex-direction: column;
        width: max-content;
        min-width: 100%;
      }
      .ns-sequence > .ns-node + .ns-node,
      .ns-cases > .case + .case,
      .ns-catches > .ns-node + .ns-node {
        margin-top: -1px;
      }
      .ns-node {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--action-fill);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      }
      /* ── Block headers/footers ── */
      .ns-header,
      .ns-footer,
      .case-title {
        padding: 7px 12px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0)),
          var(--blue-dim);
        color: var(--text-bright);
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.4;
        border-bottom: 1px solid var(--border-strong);
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .ns-footer {
        border-top: 1px solid var(--border);
        border-bottom: 0;
      }
      /* ── Action label ── */
      .ns-label,
      .empty,
      .ns-note {
        padding: 8px 12px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
          var(--action-fill);
      }
      .action-text {
        display: block;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.72;
        color: var(--text-bright);
        letter-spacing: -0.01em;
        font-variant-ligatures: none;
        tab-size: 2;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      /* ── Register syntax highlighting ── */
      .reg-arg {
        color: #7dd3fc;
        font-weight: 500;
      }
      .reg-callee {
        color: var(--green);
        font-weight: 500;
      }
      .reg-special {
        color: var(--orange);
        font-weight: 600;
      }
      .reg-fp {
        color: var(--purple);
        font-weight: 500;
      }
      /* ── Block type colours ── */
      .ns-loop,
      .ns-repeat  { background: var(--loop-fill); }
      .ns-switch  { background: var(--switch-fill); }

      .ns-switch  > .ns-header,
      .case-title              { background: var(--teal-dim);   color: var(--teal);   }

      /* Left accent stripes */
      .ns-node.ns-loop,
      .ns-node.ns-repeat  { border-left: 3px solid var(--blue); }
      .ns-node.ns-switch  { border-left: 3px solid var(--teal); }
      .ns-node.ns-call    { border-left: 3px solid var(--orange); background: var(--orange-dim); }
      .ns-node.ns-tailcall { border-left: 3px solid var(--amber); background: var(--amber-dim); }
      .ns-tailcall .call-text { color: var(--amber); }
      .ns-node.ns-return  { border-left: 3px solid var(--muted); background: rgba(20, 28, 41, 0.92); }
      .ns-node.ns-infinite { border-left: 3px solid var(--red); background: var(--red-dim); }
      .ns-node.ns-break,
      .ns-node.ns-continue { border-left: 3px solid var(--amber); background: var(--amber-dim); }
      .ns-node.ns-inline-if { border-left: 3px solid var(--purple); background: var(--purple-dim); }
      .ns-node.ns-indirect { border-left: 3px solid var(--teal); background: var(--teal-dim); }
      .ns-node.ns-prologue { border-left: 3px solid var(--green); background: var(--green-dim); }
      .ns-node.ns-epilogue { border-left: 3px solid var(--red); background: var(--red-dim); }
      .ns-node.ns-syscall { border-left: 3px solid #f7768e; background: rgba(247, 118, 142, 0.12); }
      .stack-text {
        display: block;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.65;
        color: var(--text);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .ns-prologue .stack-text { color: var(--green); }
      .ns-epilogue .stack-text { color: var(--red); }
      .stack-arrow {
        display: inline-block;
        font-size: 14px;
        margin-right: 6px;
        vertical-align: middle;
        line-height: 1;
      }
      .ns-prologue .stack-arrow { color: var(--green); }
      .ns-epilogue .stack-arrow { color: var(--red); }
      .stack-badge {
        display: inline-block;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 3px;
        margin-bottom: 4px;
      }
      .stack-badge-prologue { background: rgba(166, 218, 149, 0.15); color: var(--green); border: 1px solid rgba(166, 218, 149, 0.3); }
      .stack-badge-epilogue { background: rgba(255, 147, 169, 0.12); color: var(--red); border: 1px solid rgba(255, 147, 169, 0.3); }
      .ns-indirect .call-text { color: var(--teal); }
      .ns-infinite > .ns-header { background: var(--red-dim); color: var(--red); }
      .call-text {
        display: block;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.72;
        color: var(--orange);
        letter-spacing: -0.01em;
        font-variant-ligatures: none;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .return-text {
        display: block;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.72;
        color: var(--muted);
        font-style: italic;
        letter-spacing: -0.01em;
      }
      .syscall-text {
        display: block;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.72;
        color: #f7768e;
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .syscall-badge {
        display: inline-block;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 3px;
        margin-bottom: 4px;
        background: rgba(247, 118, 142, 0.15);
        color: #f7768e;
        border: 1px solid rgba(247, 118, 142, 0.3);
      }
      .inline-if-text {
        display: block;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.72;
        color: var(--text);
      }
      .inline-if-badge {
        display: inline-block;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 3px;
        margin-bottom: 4px;
        background: rgba(196, 167, 255, 0.15);
        color: var(--purple);
        border: 1px solid rgba(196, 167, 255, 0.3);
      }
      .inline-if-cond {
        color: var(--purple);
        font-weight: 500;
      }

      /* Depth tinting */
      .ns-depth-1 > .ns-node { background-color: rgba(255,255,255,0.012); }
      .ns-depth-2 > .ns-node { background-color: rgba(255,255,255,0.020); }
      .ns-depth-3 > .ns-node { background-color: rgba(255,255,255,0.028); }

      /* ── If/else branches (classic NS diagram with SVG) ── */
      .ns-if-cap {
        border-bottom: 1px solid var(--border);
        line-height: 0;
      }
      .ns-if-svg {
        display: block;
        height: auto;
      }
      .ns-if-triangle {
        fill: var(--blue-dim);
        stroke: var(--border);
        stroke-width: 1;
      }
      .ns-if-diagonal {
        stroke: var(--border);
        stroke-width: 1;
      }
      .ns-if-condition-fo {
        overflow: hidden;
      }
      .ns-if-condition-text {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 500;
        color: var(--text-bright);
        text-align: center;
        word-break: break-word;
        overflow-wrap: anywhere;
        line-height: 1.3;
        padding: 4px 8px;
      }
      .ns-if-label-yes {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        fill: var(--green);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .ns-if-label-no {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        fill: var(--red);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      /* ── Switch/case (classic NS diagram) ── */
      .ns-switch-header {
        padding: 9px 12px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0)),
          var(--teal-dim);
        color: var(--text-bright);
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        border-bottom: 1px solid var(--border-strong);
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .ns-switch-cases {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(140px, max-content);
        background: var(--bg);
        width: max-content;
        min-width: 100%;
      }
      .ns-switch-case-col {
        border-right: 1px solid var(--border);
        min-width: 140px;
        display: flex;
        flex-direction: column;
      }
      .ns-switch-case-col:last-child {
        border-right: none;
      }
      .ns-switch-case-value {
        padding: 9px 12px;
        background: rgba(16, 24, 39, 0.86);
        color: var(--teal);
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        border-bottom: 1px solid var(--border-strong);
        text-align: center;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .ns-switch-case-body {
        padding: 0;
        background: var(--bg);
        min-height: 40px;
      }
      .ns-switch-case-body .ns-sequence {
        padding: 8px;
      }

      /* Depth-coded if-cap triangles and diagonals (0-50, cycling blue→green→purple→teal→amber) */
      .ns-if-depth-0-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-0-diagonal { stroke: var(--blue); }
      .ns-if-depth-1-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-1-diagonal { stroke: var(--green); }
      .ns-if-depth-2-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-2-diagonal { stroke: var(--purple); }
      .ns-if-depth-3-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-3-diagonal { stroke: var(--teal); }
      .ns-if-depth-4-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-4-diagonal { stroke: var(--amber); }
      .ns-if-depth-5-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-5-diagonal { stroke: var(--blue); }
      .ns-if-depth-6-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-6-diagonal { stroke: var(--green); }
      .ns-if-depth-7-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-7-diagonal { stroke: var(--purple); }
      .ns-if-depth-8-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-8-diagonal { stroke: var(--teal); }
      .ns-if-depth-9-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-9-diagonal { stroke: var(--amber); }
      .ns-if-depth-10-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-10-diagonal { stroke: var(--blue); }
      .ns-if-depth-11-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-11-diagonal { stroke: var(--green); }
      .ns-if-depth-12-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-12-diagonal { stroke: var(--purple); }
      .ns-if-depth-13-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-13-diagonal { stroke: var(--teal); }
      .ns-if-depth-14-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-14-diagonal { stroke: var(--amber); }
      .ns-if-depth-15-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-15-diagonal { stroke: var(--blue); }
      .ns-if-depth-16-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-16-diagonal { stroke: var(--green); }
      .ns-if-depth-17-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-17-diagonal { stroke: var(--purple); }
      .ns-if-depth-18-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-18-diagonal { stroke: var(--teal); }
      .ns-if-depth-19-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-19-diagonal { stroke: var(--amber); }
      .ns-if-depth-20-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-20-diagonal { stroke: var(--blue); }
      .ns-if-depth-21-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-21-diagonal { stroke: var(--green); }
      .ns-if-depth-22-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-22-diagonal { stroke: var(--purple); }
      .ns-if-depth-23-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-23-diagonal { stroke: var(--teal); }
      .ns-if-depth-24-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-24-diagonal { stroke: var(--amber); }
      .ns-if-depth-25-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-25-diagonal { stroke: var(--blue); }
      .ns-if-depth-26-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-26-diagonal { stroke: var(--green); }
      .ns-if-depth-27-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-27-diagonal { stroke: var(--purple); }
      .ns-if-depth-28-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-28-diagonal { stroke: var(--teal); }
      .ns-if-depth-29-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-29-diagonal { stroke: var(--amber); }
      .ns-if-depth-30-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-30-diagonal { stroke: var(--blue); }
      .ns-if-depth-31-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-31-diagonal { stroke: var(--green); }
      .ns-if-depth-32-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-32-diagonal { stroke: var(--purple); }
      .ns-if-depth-33-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-33-diagonal { stroke: var(--teal); }
      .ns-if-depth-34-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-34-diagonal { stroke: var(--amber); }
      .ns-if-depth-35-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-35-diagonal { stroke: var(--blue); }
      .ns-if-depth-36-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-36-diagonal { stroke: var(--green); }
      .ns-if-depth-37-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-37-diagonal { stroke: var(--purple); }
      .ns-if-depth-38-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-38-diagonal { stroke: var(--teal); }
      .ns-if-depth-39-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-39-diagonal { stroke: var(--amber); }
      .ns-if-depth-40-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-40-diagonal { stroke: var(--blue); }
      .ns-if-depth-41-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-41-diagonal { stroke: var(--green); }
      .ns-if-depth-42-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-42-diagonal { stroke: var(--purple); }
      .ns-if-depth-43-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-43-diagonal { stroke: var(--teal); }
      .ns-if-depth-44-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-44-diagonal { stroke: var(--amber); }
      .ns-if-depth-45-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-45-diagonal { stroke: var(--blue); }
      .ns-if-depth-46-triangle { fill: var(--green-dim); stroke: var(--green); }
      .ns-if-depth-46-diagonal { stroke: var(--green); }
      .ns-if-depth-47-triangle { fill: var(--purple-dim); stroke: var(--purple); }
      .ns-if-depth-47-diagonal { stroke: var(--purple); }
      .ns-if-depth-48-triangle { fill: var(--teal-dim); stroke: var(--teal); }
      .ns-if-depth-48-diagonal { stroke: var(--teal); }
      .ns-if-depth-49-triangle { fill: var(--amber-dim); stroke: var(--amber); }
      .ns-if-depth-49-diagonal { stroke: var(--amber); }
      .ns-if-depth-50-triangle { fill: var(--blue-dim); stroke: var(--blue); }
      .ns-if-depth-50-diagonal { stroke: var(--blue); }

      .ns-branches {
        display: grid;
        grid-template-columns: repeat(2, max-content);
        background: var(--surface-2);
        width: max-content;
        min-width: 100%;
      }
      .ns-branches-single { grid-template-columns: max-content; }
      .ns-branch {
        border-left: 2px solid var(--border);
        background: var(--surface-2);
      }
      .ns-branch-yes {
        background: rgba(158, 206, 106, 0.08);
      }
      .ns-branch-no {
        background: rgba(247, 118, 142, 0.08);
      }
      .ns-branch-yes > .ns-sequence > .ns-node {
        background: rgba(158, 206, 106, 0.12);
      }
      .ns-branch-no > .ns-sequence > .ns-node {
        background: rgba(247, 118, 142, 0.12);
      }
      .ns-branch-yes .ns-label,
      .ns-branch-yes .empty,
      .ns-branch-yes .ns-note {
        background: rgba(158, 206, 106, 0.14);
      }
      .ns-branch-no .ns-label,
      .ns-branch-no .empty,
      .ns-branch-no .ns-note {
        background: rgba(247, 118, 142, 0.14);
      }
      .ns-branch-yes > .ns-branch-title {
        background: rgba(158, 206, 106, 0.2);
        color: var(--green);
      }
      .ns-branch-no > .ns-branch-title {
        background: rgba(247, 118, 142, 0.18);
        color: var(--red);
      }
      .ns-branch:first-child { border-left: 0; }
      .ns-branch-title {
        padding: 7px 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(18, 26, 41, 0.92);
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .ns-cases { background: var(--surface-2); }
      .case { border-top: 1px solid var(--border); }
      .case:first-child { border-top: 0; }
      .ns-catches { border-top: 1px solid var(--border); }

      .empty {
        color: var(--muted);
        font-style: italic;
        font-size: 12px;
        background: rgba(20, 28, 41, 0.92);
      }
      .ns-note {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        font-style: italic;
        background: var(--note-fill);
        border-top: 1px solid var(--border);
        padding: 8px 12px;
      }
      .empty-file {
        padding: 24px;
        color: var(--muted);
      }

      @media (max-width: 800px) {
        body { padding: 12px; }
        .viewer {
          width: auto;
          min-width: 0;
        }
        .viewer-body { padding: 8px; }
        .function-body {
          padding: 6px;
          overflow-x: auto;
        }
        .function-body > .ns-sequence,
        .ns-sequence {
          width: 100%;
          min-width: 0;
        }
        .ns-branches {
          width: 100%;
          min-width: 0;
          grid-template-columns: 1fr;
        }
        .ns-branches-single { grid-template-columns: 1fr; }
        .ns-branch {
          border-left: 0;
          border-top: 1px solid var(--border);
        }
        .ns-branch:first-child { border-top: 0; }
      }
    </style>
  </head>
